<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity Flip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- START -->
  <div id="screen-start" class="screen active">
    <img class="bg-img" src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1000&auto=format&fit=crop&q=70" alt="" />
    <div class="start-content">
      <img class="astronaut" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/Astronaut_cartoon.svg/160px-Astronaut_cartoon.svg.png" alt="astronaut" />
      <h1>VOID<br><em>DRIFT</em></h1>
      <p class="tagline">Collect orbs. Avoid the walls.</p>
      <div class="card">
        <div class="how-rows">
          <div>⬆⬇⬅➡ Arrow keys or WASD to move</div>
          <div>✦ Touch D-pad on mobile</div>
          <div>✖ Touch the closing walls = game over</div>
        </div>
        <div class="hi-line">BEST &nbsp;<span id="hi-start">0</span></div>
        <button id="btn-start">PLAY</button>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div id="screen-game" class="screen">
    <div id="hud">
      <div class="hcell"><span class="hlbl">SCORE</span><span id="score" class="hval">0</span></div>
      <div class="hcell mid"><span class="hlbl">MISSES</span><span id="misses" class="hval">● ● ●</span></div>
      <div class="hcell right"><span class="hlbl">COMBO</span><span id="combo" class="hval">×1</span></div>
    </div>
    <canvas id="canvas"></canvas>
    <div id="dpad">
      <div class="dpad-row"><button id="d-up">▲</button></div>
      <div class="dpad-row">
        <button id="d-left">◀</button>
        <button id="d-down">▼</button>
        <button id="d-right">▶</button>
      </div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="screen-over" class="screen">
    <img class="bg-img" src="https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1000&auto=format&fit=crop&q=70" alt="" />
    <div class="over-content">
      <h2>COLLAPSED</h2>
      <div class="over-stats">
        <div class="ostat"><span class="olbl">Score</span><span id="o-score" class="oval">0</span></div>
        <div class="ostat"><span class="olbl">Orbs</span><span id="o-orbs" class="oval">0</span></div>
        <div class="ostat"><span class="olbl">Best Combo</span><span id="o-combo" class="oval">×1</span></div>
      </div>
      <div id="o-newhi" class="newhi hidden">★ NEW BEST ★</div>
      <button id="btn-retry">PLAY AGAIN</button>
      <button id="btn-menu" class="ghost">MENU</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
